# 1. Redirect HTTP to HTTPS
server {
    listen 80;
    server_name flowforge.approvedleads.ca;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. Production SSL Server Block
server {
    listen 443 ssl http2;
    server_name flowforge.approvedleads.ca;

    # SSL Certificates mapped via your Docker volumes
    ssl_certificate /etc/letsencrypt/live/flowforge.approvedleads.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flowforge.approvedleads.ca/privkey.pem;

    # Modern Security Parameters
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_best_cipher_server_preferred on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    root /var/www/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
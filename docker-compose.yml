services:
  app:
    build:
      context: ./docker/php
    container_name: flowforge-app
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: flowforge-nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8
    container_name: flowforge-db
    restart: always
    environment:
      MYSQL_DATABASE: flowforge
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  redis:
    image: redis:alpine
    container_name: flowforge-redis
    ports:
      - "6379:6379"